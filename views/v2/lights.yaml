title: "Lights"
path: "lights"
back_path: "/lovelace/home"
subview: true
theme: subview
cards:

  - type: vertical-stack
    cards:
      
      # tiles
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: script.mood_lights
            hide_state: true
            theme: round_button
            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle

          - type: tile
            entity: script.dinner_lights
            hide_state: true
            theme: round_button
            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle

      - type: 'custom:mod-card'
        style: |
          ha-card {
            --ha-card-border-color: var(--secondary-background-color);

            margin-top: 25px;
            padding: 6px 0;
            background-color: var(--secondary-background-color);
          }
        card:
          type: vertical-stack
          cards:
            - type: tile
              entity: light.kitchen_area
              name: "Kitchen"
              hide_state: true
              features_position: inline
              features:
                - type: light-brightness
              
            - type: tile
              entity: light.family_room
              name: "Family Room"
              hide_state: true
              features_position: inline
              features:
                - type: light-brightness
              
            - type: tile
              entity: light.living_room
              name: "Living Room"
              hide_state: true

            - type: tile
              entity: light.dining_room
              name: "Dining Room"
              hide_state: true
              features_position: inline
              features:
                - type: light-brightness

            - type: tile
              entity: light.bedroom_area
              name: "Bedrooms"
              hide_state: true
              features_position: inline
              features:
                - type: light-brightness

            - type: tile
              entity: light.hallway
              name: "Hallway"
              hide_state: true

            - type: tile
              entity: light.outside_area
              name: "House"
              icon: mdi:lightbulb
              hide_state: true

      # settings
      - type: entities
        state_color: false
        theme: settings_card
        entities:
          - entity: automation.landscape_automatic_back_lights
            name: "Opening doors turns on lights"
            icon: mdi:creation