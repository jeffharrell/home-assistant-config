title: "Outside"
path: "outside"
back_path: "/lovelace/home"
subview: true
theme: subview
cards:

  - type: vertical-stack
    cards:

      # tiles
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: switch.fountain
            theme: round_button
            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle

          - type: tile
            entity: switch.garage_fan
            theme: round_button
            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle

      - type: 'custom:mod-card'
        style: |
          ha-card {
            --ha-card-border-color: var(--secondary-background-color);

            margin-top: 30px;
            padding: 6px 0;
            background-color: var(--secondary-background-color);
          }
        card:
          type: vertical-stack
          cards:
            - type: tile
              entity: cover.garage_door_3
              name: "Jillian's Garage"
              hide_state: false
              features_position: inline
              features:
                - type: cover-open-close
                
            - type: tile
              entity: cover.garage_door_2
              name: "Jeff's Garage"
              hide_state: false
              features_position: inline
              features:
                - type: cover-open-close

            - type: tile
              entity: cover.garage_door_1
              name: "Guest Garage"
              hide_state: false
              features_position: inline
              features:
                - type: cover-open-close

      # what's on
      - type: entity-filter
        card:
          title: "Currently Open"
          state_color: true
          show_header_toggle: false
          theme: padded_card
        entities:
          - binary_sensor.front_door
          - binary_sensor.family_room_doors
          - binary_sensor.master_bedroom_doors
          - binary_sensor.laundry_room_door
          - binary_sensor.dining_room_window
          - binary_sensor.living_room_window_left
          - binary_sensor.living_room_window_right
          - binary_sensor.kitchen_window
          - binary_sensor.boys_window
          - binary_sensor.playroom_window
          - binary_sensor.guest_window
          - binary_sensor.master_bedroom_window
          - binary_sensor.garage_door_side
        conditions:
          - condition: or
            conditions:
            - condition: state
              state: "open"
            - condition: state
              state: "on"
        show_empty: false

      # settings
      - type: entities
        state_color: false
        theme: settings_card
        entities:
          - entity: input_boolean.camera_motion_enabled
            icon: mdi:creation
            name: "Motion Alerts"
            tap_action:
              action: none
          - entity: automation.cameras_doorbell
            icon: mdi:creation
            name: "Doorbell Alerts"
            tap_action:
              action: none
          - entity: automation.cameras_mailbox_open
            icon: mdi:creation
            name: "Mailbox Alerts"
            tap_action:
              action: none