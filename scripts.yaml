play_music_kitchen:
  sequence:

play_music_outside:
  sequence:

wake_up:
  sequence:
    - action: alarm_control_panel.alarm_disarm
      data:
        entity_id: alarm_control_panel.alarm
    - condition: template
      value_template: "{{ state_attr('sun.sun', 'elevation') < 2 }}"
    - action: scene.turn_on
      data:
        entity_id: scene.wake_up

good_night:
  sequence:
    - action: alarm_control_panel.alarm_arm_home
      data:
        entity_id: alarm_control_panel.alarm

away:
  sequence:
    - action: alarm_control_panel.alarm_arm_away
      data:
        entity_id: alarm_control_panel.alarm

dinner_lights:
  sequence:
    - action: scene.turn_on
      data:
        entity_id: scene.dinner_lights
    - condition: template
      value_template: "{{ state_attr('sun.sun', 'elevation') < 4 }}"
    - action: scene.turn_on
      data:
        entity_id: scene.dinner_lights_more

mood_lights:
  sequence:
    - action: scene.turn_on
      data:
        entity_id: scene.mood_lights

hvac_disable:
  sequence:
    - if:
        condition: state
        entity_id: climate.home
        state: "heat"
      then:
        action: climate.set_temperature
        data:
          entity_id: climate.home
          temperature: !secret climate_off_heat
      else:
        action: climate.set_temperature
        data:
          entity_id: climate.home
          temperature: !secret climate_off_cool

hvac_resume:
  sequence:
    - action: button.press
      data:
        entity_id: button.home_clear_hold

let_dog_out:
  mode: single
  sequence:
    - action: automation.turn_off
      data:
        entity_id:
          - automation.alarm_disarmed_mode
          - automation.alarm_home_mode
    - action: alarm_control_panel.alarm_disarm
      data:
        entity_id: alarm_control_panel.alarm
    - action: timer.start
      target:
        entity_id: timer.let_dog_out
