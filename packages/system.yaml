input_boolean:
  guest_mode_enabled:
    name: "Guest Mode"
    icon: "mdi:bed"

  play_kitchen_music:
    name: "Play Kitchen Music"
    icon: "mdi:music"

  play_outside_music:
    name: "Play Outside Music"
    icon: "mdi:music"

automation:
  - alias: "System - Theme change"
    trigger:
      - platform: homeassistant
        event: start
    actions:
      action: frontend.set_theme
      data:
        name: app_theme

  - alias: "System - Reset switches"
    mode: parallel
    trigger:
      platform: state
      entity_id: 
        - input_boolean.play_kitchen_music
        - input_boolean.play_outside_music
      to: "on"
      for:
        minutes: 1
    actions:
      - action: homeassistant.turn_off
        target:
          entity_id: "{{ trigger.entity_id }}"

  - alias: "System - Reset settings"
    trigger:
      platform: time
      at: "04:00:00"
    actions:
      - action: homeassistant.turn_on
        entity_id:
          - automation.cameras_doorbell
          - automation.cameras_mailbox_open
          - automation.climate_windows_open
          - automation.landscape_fountain
          - automation.landscape_automatic_back_lights

  - alias: "System - Reset speakers"
    trigger:
      platform: time
      at: "12:00:00"
    actions:
      - action: media_player.volume_set
        target:
          entity_id: 
            - media_player.kitchen_hub
            - media_player.living_room_speakers
            - media_player.office_speakers
        data:
          volume_level: 0.6
      # some speakers should be quieter
      - action: media_player.volume_set
        target:
          entity_id: media_player.master_bedroom_speaker
        data:
          volume_level: 0.5

  - alias: "System - Refresh non-zwave plus nodes"
    trigger:
      platform: time_pattern
      minutes: "/20"
    actions:
      - action: zwave_js.refresh_value
        data:
          entity_id:
            - light.family_room
            - light.island
            - light.kitchen_1
            - light.kitchen_2
            - light.master_bedroom
            - light.pantry
          refresh_all_values: false

  - alias: "System - Refresh Apple TVs"
    mode: parallel
    trigger:
      platform: state
      entity_id: 
        - media_player.family_room_apple_tv
        - media_player.living_room_apple_tv
        - media_player.master_bedroom_apple_tv
      to: "unavailable"
      for:
        minutes: 1
    actions:
      - action: homeassistant.reload_config_entry
        target:
          entity_id: "{{ trigger.entity_id }}"
      - action: notify.mobile_app_jeffs_iphone
        data:
          message: "Resetting {{ trigger.entity_id }}"

  # Disabled by default
  - alias: "System - Entity health check"
    initial_state: False
    trigger:
      platform: time
      at: "04:00:00"
      variables:
         unhealthy: "{{ states | selectattr('state', 'in', ['unavailable', 'unknown', 'dead', 'none']) | list | map(attribute='name') | join(', ') }}"
    condition:
      - condition: time
        weekday:
          - sun
    actions:
      - if:
          condition: template
          value_template: "{{ unhealthy | length > 0 }}"
        then:
          action: persistent_notification.create
          data:
            notification_id: unhealthy
            message: "The following are unavailable: {{ unhealthy }}"

  - alias: "System - Handle notification actions"
    mode: parallel
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
    variables:
      action: "{{ trigger.event.data.action }}"
    actions:
      - choose:
          # garage "Close" button: action id is garage_close_binary_sensor.garage_door_N_open
          - conditions: "{{ action.startswith('garage_close_') }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: >
                    {{ action | replace('garage_close_', '') | replace('binary_sensor.', 'switch.') | replace('_open', '') }}
          # bedtime reminder arm buttons
          - conditions: "{{ action == 'alarm_arm_home' }}"
            sequence:
              - action: script.good_night
          - conditions: "{{ action == 'alarm_arm_away' }}"
            sequence:
              - action: script.away

  - alias: "System - Low battery scan"
    trigger:
      - platform: time
        at: "09:00:00"
      - platform: homeassistant
        event: start
    variables:
      threshold: !secret low_battery_threshold
      low: >
        {% set ns = namespace(items=[]) %}
        {% for s in states.sensor
           if s.attributes.get('device_class') == 'battery'
           and s.state not in ['unknown', 'unavailable']
           and (s.state | float(101)) < threshold | float %}
          {% set ns.items = ns.items + [s.name] %}
        {% endfor %}
        {% for b in states.binary_sensor
           if b.attributes.get('device_class') == 'battery' and b.state == 'on' %}
          {% set ns.items = ns.items + [b.name] %}
        {% endfor %}
        {% if states('sensor.outside_battery') == '- -' %}
          {% set ns.items = ns.items + ['Weather Station'] %}
        {% endif %}
        {{ ns.items | join(', ') }}
    condition:
      - condition: template
        value_template: "{{ low | length > 0 }}"
    actions:
      - action: persistent_notification.create
        data:
          notification_id: low_battery
          title: "Low batteries"
          message: "The following batteries are low: {{ low }}."
      - action: notify.phones
        data:
          title: "Home"
          message: "Low batteries: {{ low }}."

  - alias: "System - Critical entity down"
    mode: parallel
    trigger:
      - platform: state
        entity_id:
          - alarm_control_panel.alarm
          - climate.home
          - binary_sensor.powerwall_status
          - camera.front_door
          - camera.driveway
          - camera.front_patio
        to:
          - "unavailable"
          - "unknown"
        for:
          minutes: 5
    actions:
      - action: notify.phones
        data:
          title: "Home"
          message: "{{ trigger.to_state.attributes.friendly_name }} is {{ trigger.to_state.state }}."
