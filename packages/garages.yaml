homeassistant:
    customize_glob:
      "binary_sensor.garage_door_*":
        device_class: opening

template:
  - cover:
    - unique_id: garage_door_1
      state: '{{ is_state("binary_sensor.garage_door_1_open", "on") }}'
      device_class: garage
      open_cover:
        - action: switch.turn_on
          target: 
            entity_id: switch.garage_door_1
      close_cover:
        - action: switch.turn_on
          target: 
            entity_id: switch.garage_door_1

    - unique_id: garage_door_2
      state: '{{ is_state("binary_sensor.garage_door_2_open", "on") }}'
      device_class: garage
      open_cover:
        - action: switch.turn_on
          target: 
            entity_id: switch.garage_door_2
      close_cover:
        - action: switch.turn_on
          target: 
            entity_id: switch.garage_door_2

    - unique_id: garage_door_3
      state: '{{ is_state("binary_sensor.garage_door_3_open", "on") }}'
      device_class: garage
      open_cover:
        - action: switch.turn_on
          target: 
            entity_id: switch.garage_door_3
      close_cover:
        - action: switch.turn_on
          target: 
            entity_id: switch.garage_door_3

automation:
  - alias: "Garages - Door open"

    trigger:
      platform: state
      entity_id:
        - binary_sensor.garage_door_1_open
        - binary_sensor.garage_door_2_open
        - binary_sensor.garage_door_3_open
      to: "on"
      for:
        minutes: 10
    mode: parallel
    actions:
      # take a picture
      - action: camera.snapshot
        data:
          entity_id: camera.driveway
          filename: "/config/www/cameras/garages.jpg"
      # send notification
      - action: notify.phones
        data:
          title: "Home"
          message: "{{ trigger.to_state.attributes.friendly_name }} is open"
          data:
            url: "/lovelace/outside"
            image: "/local/cameras/garages.jpg"
            actions:
              - action: "garage_close_{{ trigger.to_state.entity_id }}"
                title: "Close"

  - alias: "Garages - Fan"
    trigger:
      - platform: numeric_state
        entity_id: sensor.garage_temp
        above: !secret garage_fan_above
        for:
          minutes: 10
        variables:
          action: "turn_on"
      - platform: numeric_state
        entity_id: sensor.garage_temp
        below: !secret garage_fan_below
        for:
          minutes: 10
        variables:
          action: "turn_off"
    actions:
      - action: >
          switch.{{ action }}
        entity_id: switch.garage_fan